# Clash Client Config
# 本地 Clash 客户端配置 - 连接到远程 SSH Tunnel

# 本地代理端口
port: 7890
socks-port: 7891
allow-lan: false
bind-address: "*"

# 运行模式: rule (规则) / global (全局) / direct (直连)
mode: rule

# 日志级别
log-level: info

# RESTful API (用于管理)
external-controller: 127.0.0.1:9090

# DNS 配置
dns:
  enable: true
  listen: 127.0.0.1:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  fallback:
    - 8.8.8.8
    - 1.1.1.1

# 远程 Clash 服务器 (通过 SSH 隧道连接)
proxies:
  - name: "ssh-tunnel"
    type: http
    server: 127.0.0.1
    port: 7890
    # 可选认证
    # username: "your-username"
    # password: "your-password"

  # 备用直连
  - name: "direct"
    type: direct

# 代理组
proxy-groups:
  - name: "auto"
    type: select
    proxies:
      - ssh-tunnel
      - direct

  - name: "proxy"
    type: select
    proxies:
      - ssh-tunnel

  - name: "direct-group"
    type: select
    proxies:
      - direct

# 智能分流规则
rules:
  # ========== GeoIP 地理分流 ==========
  - GEOIP,CN,DIRECT

