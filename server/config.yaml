# Clash Server Config
# 服务器端 Clash 配置 - 智能分流版

# 代理端口 (供 SSH 隧道连接)
port: 7890
socks-port: 7891

# HTTP 代理入口 (可选)
#混合端口: 7892

# 仅允许本地连接 (通过 SSH 隧道访问)
allow-lan: false
bind-address: "*"

# 运行模式: rule (规则) / global (全局) / direct (直连)
mode: rule

# 日志级别: silent / error / warning / info / debug
log-level: info

# RESTful API (用于管理接口)
external-controller: 127.0.0.1:9090
# external-controller: 0.0.0.0:9090  # 取消注释可远程管理

# DNS 配置 - 核心智能分流
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # 国内 DNS
  nameserver:
    - 223.5.5.5        # 阿里 DNS
    - 119.29.29.29     # 腾讯 DNS
    - 114.114.114.114  # 114 DNS
  # 海外 DNS (备用)
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - 9.9.9.9
  fallback-filter:
    geoip: true
    geoip-code: CN

# 代理配置 (直连)
proxies:
  - name: "direct"
    type: direct

# 代理组
proxy-groups:
  - name: "auto"
    type: select
    proxies:
      - direct

# 智能分流规则
rules:
  # ========== GeoIP 地理分流 ==========
  # 中国 IP 段直连
  - GEOIP,CN,DIRECT

