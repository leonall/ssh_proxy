mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

proxies:
  - name: "my-hy2-ip"
    type: hysteria2
    server: ip
    port: 443
    password: "密码"
    obfs: salamander
    obfs-password: "密码"
    sni: ip
    alpn:
      - h3
    skip-cert-verify: true


proxy-groups:
  - name: "PROXY"
    type: select
    proxies:
      - my-hy2-ip
      - DIRECT

rules:
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
